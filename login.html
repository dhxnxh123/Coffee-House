<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeHouse - Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #232220;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            background-color: #332d29;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #4a3f35;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-header h1 {
            color: #e6b980;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(230, 185, 128, 0.4);
        }

        .brand-header p {
            color: #bc8f62;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1c7bd;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #232220;
            border: 1px solid #5a4e42;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #bc8f62;
            box-shadow: 0 0 8px rgba(188, 143, 98, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #bc8f62, #966f46);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #a47b53, #825f3b);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #a89f95;
        }

        .auth-footer a {
            color: #bc8f62;
            text-decoration: none;
            font-weight: bold;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-header">
            <h1>CoffeeHouse</h1>
            <p>Welcome back! Please login to your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
                <div id="loginError" class="error-message">Invalid email or password.</div>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const loginError = document.getElementById('loginError');
            
            loginError.style.display = 'none';

            // 1. Fetch registered users
            const users = JSON.parse(localStorage.getItem('coffee_house_users')) || [];

            // 2. Validate email and password match
            const validUser = users.find(user => user.email === email && user.password === password);

            if (validUser) {
                // 3. Store active session
                localStorage.setItem('coffee_house_session', JSON.stringify({
                    username: validUser.username,
                    email: validUser.email
                }));
                
                window.location.href = 'index.html'; // Redirect to your home page
            } else {
                loginError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
